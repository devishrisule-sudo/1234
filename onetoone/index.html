<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One-to-One Game</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 10px;
}

h1 {
    font-size: 26px;
    color: #333;
}

.question {
    font-size: 24px;
    margin: 20px 0;
}

.items {
    font-size: 42px;
    margin-bottom: 20px;
}

.options {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.option {
    width: 85px;
    height: 85px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    margin: 10px;
    border: 4px solid #ff6f61;
    cursor: pointer;
    transition: transform 0.2s;
}

.option:hover {
    transform: scale(1.1);
}

#restartBtn {
    display: none;
    margin-top: 20px;
    padding: 14px 24px;
    font-size: 18px;
    background: #ff6f61;
    color: white;
    border: none;
    border-radius: 12px;
}

/* NEW CONFETTI */
.confetti {
    position: fixed;
    width: 12px;
    height: 12px;
    top: -20px;
    animation: fall linear forwards;
    opacity: 0.9;
}

@keyframes fall {
    0% {
        transform: translateY(0) rotate(0deg);
    }
    100% {
        transform: translateY(110vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Count & Match 🎉</h1>
    <div class="question" id="questionText"></div>
    <div class="items" id="items"></div>
    <div class="options" id="options"></div>
    <button id="restartBtn" onclick="restartGame()">Restart 🔄</button>
</div>

<script>
let questions = [
    {items: "🍎 🍎", answer: 2, options: [1,2,3]},
    {items: "🐶 🐶 🐶", answer: 3, options: [2,3,4]},
    {items: "⭐ ⭐ ⭐ ⭐", answer: 4, options: [3,4,5]},
    {items: "🚗 🚗 🚗 🚗 🚗", answer: 5, options: [4,5,6]}
];

let current = 0;

// SHUFFLE FUNCTION
function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// SOUND
function playSound(type){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    let gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if(type === "correct"){
        osc.frequency.value = 900;
    } else {
        osc.frequency.value = 250;
    }

    gain.gain.value = 0.35;
    osc.start();
    setTimeout(()=>osc.stop(), 300);
}

// IMPROVED CONFETTI 🎉
function createConfetti(){
    let colors = ["#ff4d4d","#ffcc00","#66ff66","#66ccff","#ff66cc"];

    for(let i=0;i<60;i++){
        let conf = document.createElement("div");
        conf.className = "confetti";

        conf.style.left = Math.random()*100 + "vw";
        conf.style.background = colors[Math.floor(Math.random()*colors.length)];
        conf.style.width = (8 + Math.random()*8) + "px";
        conf.style.height = conf.style.width;

        let duration = 2 + Math.random()*2;
        conf.style.animationDuration = duration + "s";

        document.body.appendChild(conf);

        setTimeout(()=>conf.remove(), duration * 1000);
    }
}

// LOAD QUESTION
function loadQuestion(){
    if(current >= questions.length){
        document.getElementById("questionText").innerText = "Great Job! 🎉";
        document.getElementById("items").innerText = "";
        document.getElementById("options").innerHTML = "";
        document.getElementById("restartBtn").style.display = "block";
        return;
    }

    let q = questions[current];

    document.getElementById("questionText").innerText = "How many?";
    document.getElementById("items").innerText = q.items;

    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    let shuffledOptions = shuffle([...q.options]);

    shuffledOptions.forEach(num => {
        let btn = document.createElement("div");
        btn.className = "option";
        btn.innerText = num;

        btn.onclick = () => checkAnswer(num);

        optionsDiv.appendChild(btn);
    });
}

// CHECK ANSWER
function checkAnswer(selected){
    let correct = questions[current].answer;

    if(selected === correct){
        playSound("correct");
        createConfetti();
    } else {
        playSound("wrong");
    }

    current++;
    setTimeout(loadQuestion, 900);
}

// RESTART
function restartGame(){
    current = 0;
    document.getElementById("restartBtn").style.display = "none";
    loadQuestion();
}

// START
loadQuestion();
</script>

</body>
</html>
